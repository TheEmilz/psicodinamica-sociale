<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Non indicizzare il sito mentre è in manutenzione -->
    <meta name="robots" content="noindex, nofollow" />

    <title>Sito in manutenzione – Psicodinamica Sociale</title>
    <meta name="description" content="Stiamo lavorando ai contenuti del sito. Torneremo presto online." />

    <style>
      :root {
        --blue: #1a3a6e;
        --blue-dark: #0f2247;
        --orange: #f97316;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: linear-gradient(160deg, #1a3a6e 0%, #0f2247 100%);
        color: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 560px;
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        padding: 3rem 2rem;
        backdrop-filter: blur(8px);
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: var(--orange);
        color: #fff;
      }
      .icon svg { width: 38px; height: 38px; }
      h1 {
        font-size: 1.75rem;
        line-height: 1.2;
        margin-bottom: 1rem;
        letter-spacing: -0.5px;
      }
      p {
        font-size: 1.05rem;
        line-height: 1.6;
        color: rgba(245, 245, 245, 0.85);
        margin-bottom: 0.75rem;
      }
      .tag {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.45rem 1rem;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.18);
        color: var(--orange);
        border: 1px solid rgba(249, 115, 22, 0.4);
      }
      .brand {
        margin-top: 2rem;
        font-size: 0.9rem;
        color: rgba(245, 245, 245, 0.55);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
        </svg>
      </div>
      <h1>Stiamo lavorando ai contenuti</h1>
      <p>Il sito è momentaneamente in manutenzione mentre completiamo e perfezioniamo i contenuti.</p>
      <p>Torneremo online molto presto. Grazie per la pazienza.</p>
      <span class="tag">Sito in manutenzione</span>
      <div class="brand">Psicodinamica Sociale</div>
    </main>
  </body>
</html>
