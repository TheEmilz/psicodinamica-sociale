<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="24" fill="#fff7ed"/>
  <circle cx="200" cy="195" r="165" stroke="#fed7aa" stroke-width="1.5"/>

  <!-- Laptop base -->
  <rect x="70" y="262" width="260" height="18" rx="9" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <ellipse cx="200" cy="280" rx="32" ry="7" fill="#fdba74"/>

  <!-- Laptop body -->
  <rect x="85" y="115" width="230" height="152" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>

  <!-- Screen area -->
  <rect x="97" y="127" width="206" height="123" rx="10" fill="white" stroke="#fed7aa" stroke-width="1"/>

  <!-- Camera dot -->
  <circle cx="200" cy="120" r="4" fill="#fb923c"/>

  <!-- Person head on screen -->
  <circle cx="200" cy="166" r="27" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <!-- Face features -->
  <circle cx="191" cy="160" r="4" fill="#ea580c"/>
  <circle cx="209" cy="160" r="4" fill="#ea580c"/>
  <path d="M 192 175 Q 200 182 208 175" stroke="#ea580c" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Shoulders -->
  <path d="M 153 228 Q 177 213 200 211 Q 223 213 247 228" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>

  <!-- Wifi / signal bars (top-right of screen) -->
  <rect x="272" y="136" width="6" height="8" rx="2" fill="#fdba74"/>
  <rect x="281" y="133" width="6" height="11" rx="2" fill="#fb923c"/>
  <rect x="290" y="130" width="6" height="14" rx="2" fill="#f97316"/>

  <!-- Chat bubble bottom-left -->
  <rect x="103" y="211" width="50" height="26" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <path d="M 114 237 L 108 244 L 123 237" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <circle cx="117" cy="224" r="3" fill="#f97316"/>
  <circle cx="128" cy="224" r="3" fill="#f97316"/>
  <circle cx="139" cy="224" r="3" fill="#f97316"/>

  <!-- Step badges at bottom -->
  <circle cx="105" cy="322" r="22" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="105" y="327" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ea580c" font-weight="600">01</text>
  <circle cx="200" cy="322" r="22" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="327" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ea580c" font-weight="600">02</text>
  <circle cx="295" cy="322" r="22" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="295" y="327" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#ea580c" font-weight="600">03</text>

  <!-- Dashed lines between badges -->
  <line x1="127" y1="322" x2="178" y2="322" stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="222" y1="322" x2="273" y2="322" stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Decorative accent dots -->
  <circle cx="348" cy="132" r="5" fill="#fed7aa"/>
  <circle cx="58" cy="172" r="4" fill="#fed7aa"/>
  <circle cx="356" cy="198" r="3" fill="#fdba74"/>
  <circle cx="48" cy="232" r="3.5" fill="#fdba74"/>
</svg>
