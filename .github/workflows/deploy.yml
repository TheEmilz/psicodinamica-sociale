name: Deploy sito statico su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi minimi necessari per pubblicare su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola pubblicazione alla volta; non annulla un deploy in corso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SITO IN MANUTENZIONE
      # Pubblichiamo solo la pagina di manutenzione: il sito reale NON viene
      # buildato né caricato, quindi non è raggiungibile in alcun modo.
      # Per riattivare il sito, ripristinare gli step "Setup Node / Install /
      # Build" qui sotto e cambiare il path dell'artifact da ./maintenance a ./dist.
      #
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: npm
      #
      # - name: Install dependencies
      #   run: npm ci
      #
      # - name: Build
      #   run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./maintenance

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
