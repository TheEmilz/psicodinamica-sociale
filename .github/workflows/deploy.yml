name: Deploy sito statico su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi minimi necessari per pubblicare su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola pubblicazione alla volta; non annulla un deploy in corso
concurrency:
  group: pages
  cancel-in-progress: false

# Forza tutte le action JavaScript a girare su Node.js 24 (le action Pages
# ufficiali dichiarano ancora Node 20: questa variabile evita il warning di
# deprecazione fino al rilascio delle nuove major).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
