  - generic [ref=e147]:
    - paragraph [ref=e148]: Lavora con noi
    - heading "Lavora con Noi" [level=2] [ref=e149]
    - paragraph [ref=e150]: Il progetto nasce con l'intenzione di crescere, e possono aprirsi spazi per nuove collaborazioni. Se sei uno psicoterapeuta di formazione psicodinamica con almeno dieci anni di esperienza clinica, un percorso di almeno 5 anni di analisi personale e una pratica continuativa di supervisione, puoi inviare la tua candidatura tramite il form di contatto.
    - paragraph [ref=e151]: "Ciò che cerchiamo non si esaurisce nella competenza tecnica. Crediamo che fare bene questo lavoro significhi prima di tutto averlo esperito su se stessi — che la psicoterapia non sia soltanto un mestiere, ma un modo di stare nel mondo e in relazione. L'analisi personale, in questo senso, non è un requisito formale: è la condizione che rende possibile tutto il resto."
    - link "Invia la tua candidatura" [ref=e153] [cursor=pointer]:
      - /url: "#/lavora-con-noi"
