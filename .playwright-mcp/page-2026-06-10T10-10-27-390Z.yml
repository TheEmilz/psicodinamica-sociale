        - heading "Il Nostro Team" [level=2] [ref=e100]
        - paragraph [ref=e101]: Siamo psicoterapeuti di formazione psicodinamica con più di dieci anni di esperienza clinica e un lungo percorso di analisi personale. Lavoriamo online, con cura e con metodo e crediamo che la qualità di un percorso terapeutico non debba essere un privilegio, né una questione di geografia o di disponibilità economica. La cura dovrebbe essere alla portata di chi ne ha bisogno.
        - paragraph [ref=e102]: Il team vanta una consolidata esperienza clinica nei disturbi del comportamento alimentare, nelle dipendenze, nei disturbi dell'umore, nei disturbi d'ansia e ossessivi, nella presa in carico di quadri clinici complessi, inclusi i disturbi di personalità e le forme di psicopatologia grave.
