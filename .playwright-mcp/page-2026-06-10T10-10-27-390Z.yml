        - heading "Cos'è la Psicoterapia Psicodinamica" [level=2] [ref=e47]:
          - text: Cos'è la Psicoterapia
          - text: Psicodinamica
        - paragraph [ref=e48]: La psicoterapia psicodinamica nasce dal pensiero di Sigmund Freud e si è sviluppata nel corso del Novecento attraverso il contributo di molti clinici e teorici — da Melanie Klein a Donald Winnicott, da Wilfred Bion a Jacques Lacan — che ne hanno ampliato e trasformato i fondamenti.
        - paragraph [ref=e49]: "Il suo presupposto centrale è che una parte rilevante della nostra vita psichica sia inconscia: desideri, conflitti, emozioni e memorie che non sono direttamente accessibili alla coscienza, ma che orientano profondamente il nostro modo di stare al mondo, di amare, di soffrire."
        - paragraph [ref=e50]:
          - text: La psicoterapia psicodinamica lavora attraverso la parola e la relazione. Non si concentra solo sul sintomo, ma cerca di esplorare il significato che quel sintomo porta con sé. Il disagio non viene eliminato, ma
          - strong [ref=e51]: ascoltato, e attraverso quell'ascolto, trasformato
          - text: .
